publisherName: Fortinet, Inc.
serviceCategory: Cybersecurity / Networking
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Cybersecurity
  - Networking
  - Firewall
  - SASE
  - FinOps
  - FOCUS
description: FOCUS-aligned FinOps mapping for Fortinet — appliance + FortiCare entitlement model with FortiCloud SaaS subscriptions layered on top. APIs are bundled with the underlying product license rather than sold as separate API plans.
notes: No public list pricing. Meters reflect typical Fortinet invoice patterns (per-appliance license, per-user / per-bandwidth FortiCloud, FortiCare renewal).
sources:
  - https://www.fortinet.com/products
  - https://www.fortinet.com/products/management/forticloud
billingModel:
  pricingCategory: Perpetual + Subscription
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Adjustment
    - Credit
focusColumns:
  ServiceName: Fortinet
  ServiceCategory: Cybersecurity / Networking
  ProviderName: Fortinet, Inc.
  PublisherName: Fortinet, Inc.
  InvoiceIssuerName: Fortinet, Inc. (or reseller of record)
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: appliances
    description: Hardware/VM appliances under active license (FortiGate, FortiSwitch, FortiAP, etc.)
    unit: appliance-year
    aggregation: max
    dimensions:
      - product
      - model
      - site
  - name: forticare_renewal
    description: FortiCare support and entitlement renewal per appliance
    unit: appliance-year
    aggregation: max
    dimensions:
      - tier
      - appliance
  - name: forticloud_users
    description: User-based FortiCloud subscriptions (FortiSASE, FortiAuthenticator Cloud, etc.)
    unit: seat-year
    aggregation: max
    dimensions:
      - service
      - region
  - name: forticloud_bandwidth
    description: Bandwidth-based FortiCloud subscriptions (FortiSASE secure web gateway, etc.)
    unit: Gbps-month
    aggregation: max
    dimensions:
      - service
  - name: forticloud_log_volume
    description: Log/event volume ingested into FortiAnalyzer Cloud
    unit: GB
    aggregation: sum
    dimensions:
      - service
      - device
principles:
  - name: Visibility
    description: Pull FortiCloud admin reports and FortiManager inventory; reconcile active-appliance counts against the FortiCare renewal invoice to surface decommissioned hardware still on the bill.
  - name: Allocation
    description: Tag appliances and FortiCloud tenants by site/business-unit for chargeback; FortiAnalyzer's logs can be partitioned by ADOM for finer attribution.
  - name: Optimization
    description: Right-size FortiCare tiers (8x5 vs 24x7 vs 360); decommission unused appliances; consolidate FortiCloud subscriptions onto an enterprise agreement; archive old FortiAnalyzer logs to cheaper tiers.
  - name: Accountability
    description: Network/security operations owns the appliance fleet; finance audits FortiCare renewal lists annually against the asset inventory.
maintainers: []
