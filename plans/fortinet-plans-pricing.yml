specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Fortinet
providerId: fortinet
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Cybersecurity
  - Networking
  - Firewall
  - SASE
  - SD-WAN
description: Fortinet sells a broad cybersecurity and networking portfolio (FortiGate NGFW, FortiManager, FortiAnalyzer, FortiSASE, FortiCloud, FortiAuthenticator, etc.) primarily through partners and resellers. Pricing is appliance-and-license based and is not publicly listed; APIs (FortiOS REST API, FortiManager JSON-RPC, FortiCloud APIs) are included for customers under their device entitlements / FortiCare contracts.
notes: No public price list at fortinet.com. APIs are included with the underlying product entitlement rather than sold as separate API plans. Scaffold reduced to bundled-with-product + FortiCloud SaaS + enterprise.
sources:
  - https://www.fortinet.com/products
  - https://www.fortinet.com/products/management/forticloud
plans:
  - id: fortinet-bundled-with-product
    name: Bundled with Product / FortiCare
    type: enterprise
    description: REST and JSON-RPC API access on FortiGate, FortiManager, FortiAnalyzer, FortiSwitch, FortiAP, etc. is included with the device license and active FortiCare support contract. No additional API charge.
    entries:
      - label: API Access (Bundled)
        description: Included with active FortiCare entitlement
        name: bundled_api
        type: flat
        metric: device
        limit: -1
        timeFrame: year
        geo: global
        domains:
          - https://{fortigate}/api/v2
          - https://{fortimanager}/jsonrpc
        unit: 1
        price: included with FortiCare
        userMultiplied: false
    elements:
      - name: FortiOS REST API
      - name: FortiManager JSON-RPC API
      - name: FortiAnalyzer API
      - name: FortiSwitch / FortiAP APIs
      - name: FortiCare Support Entitlement
  - id: fortinet-forticloud
    name: FortiCloud SaaS Subscriptions
    type: subscription
    description: FortiCloud-hosted services (FortiSASE, FortiManager Cloud, FortiAnalyzer Cloud, FortiGate Cloud, FortiSandbox Cloud, FortiAuthenticator Cloud) sold as annual subscriptions. Pricing per-user, per-device, or per-bandwidth depending on service.
    entries:
      - label: FortiCloud Subscription
        description: Annual subscription per FortiCloud service (FortiSASE per user, FortiAnalyzer Cloud per GB ingested, etc.)
        name: forticloud_subscription
        type: subscription
        metric: varies
        limit: -1
        timeFrame: year
        geo: global
        domains:
          - https://*.fortinet.com
        unit: 1
        price: contact reseller
        userMultiplied: false
    elements:
      - name: FortiSASE
      - name: FortiManager Cloud
      - name: FortiAnalyzer Cloud
      - name: FortiGate Cloud
      - name: FortiSandbox Cloud
      - name: FortiCloud APIs
  - id: fortinet-enterprise
    name: Enterprise / Service Provider
    type: enterprise
    description: Negotiated multi-product enterprise agreements (Fortinet Enterprise License, MSSP/service-provider programs) with custom pricing and bundled FortiCare 360.
    entries:
      - label: Enterprise Agreement
        description: Custom enterprise agreement
        name: enterprise
        type: subscription
        metric: year
        limit: -1
        timeFrame: year
        geo: configurable
        domains: []
        unit: 1
        price: custom
        userMultiplied: false
    elements:
      - name: All Fortinet Products
      - name: FortiCare 360
      - name: Dedicated TAM
      - name: Custom SLA
maintainers: []
